services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8000"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///data/agnes_pool.db
      - STATIC_DIR=/app/static
    restart: unless-stopped
